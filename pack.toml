[pack]
id = "ao-core-packs"
version = "0.1.0"
schema = "ao.pack.v1"
kind = "collection"
description = "Core AO workflow packs, skills, and agent runtime configuration"
repository = "https://github.com/launchapp-dev/ao-core-packs"

[compatibility]
ao_min_version = "0.2.12"

[contents]
packs = ["ao.task", "ao.requirement", "ao.review"]
skills = "skills/"
workflows = "workflows/"
config = "config/"

[contents.packs_description]
"ao.task" = "Standard task workflows: standard, ui-ux, quick-fix, gated, triage, refine"
"ao.requirement" = "Requirement lifecycle: draft, refine, plan, execute"
"ao.review" = "Reusable review and test cycles"
